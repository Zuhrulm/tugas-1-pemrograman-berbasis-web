<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Stok Bahan Ajar</title>

<link rel="stylesheet" href="style.css">
<script src="data.js"></script>
</head>

<body>

<div class="container">

<h2>📚 Stok Bahan Ajar</h2>

<p id="notif" class="notif"></p>

<table id="tabelStok">
  <thead>
    <tr>
      <th>No</th>
      <th>Gambar</th>
      <th>Kode</th>
      <th>Nama</th>
      <th>Jenis</th>
      <th>Edisi</th>
      <th>Stok</th>
      <th>Aksi</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<form id="formStok">
  <h3>Tambah Data</h3>

  <input type="text" id="kodeBarang" placeholder="Kode">
  <input type="text" id="namaBarang" placeholder="Nama">
  <input type="text" id="jenisBarang" placeholder="Jenis">
  <input type="text" id="edisi" placeholder="Edisi">
  <input type="number" id="stok" placeholder="Stok">

  <button type="submit">Tambah</button>
</form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  if (typeof dataBahanAjar === "undefined") {
    dataBahanAjar = [];
  }

  const tbody = document.querySelector("#tabelStok tbody");
  const form = document.getElementById("formStok");
  const notif = document.getElementById("notif");

  function tampilkanData() {
    tbody.innerHTML = "";

    dataBahanAjar.forEach((item, index) => {
      tbody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>
            <img src="${item.cover}" onerror="this.src='buku.jpg'">
          </td>
          <td>${item.kodeBarang}</td>
          <td>${item.namaBarang}</td>
          <td>${item.jenisBarang}</td>
          <td>${item.edisi}</td>
          <td>${item.stok}</td>
          <td>
            <button class="btn-hapus" onclick="hapusData(${index})">✖</button>
          </td>
        </tr>
      `;
    });
  }

  window.hapusData = function(index) {
    dataBahanAjar.splice(index, 1);
    tampilkanData();
  };

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const kode = document.getElementById("kodeBarang").value;
    const nama = document.getElementById("namaBarang").value;
    const jenis = document.getElementById("jenisBarang").value;
    const edisi = document.getElementById("edisi").value;
    const stok = document.getElementById("stok").value;

    if (!kode || !nama || !jenis || !edisi || !stok) {
      notif.innerText = "Isi semua data!";
      notif.style.color = "yellow";
      return;
    }

    dataBahanAjar.push({
      kodeLokasi: "MANUAL",
      kodeBarang: kode,
      namaBarang: nama,
      jenisBarang: jenis,
      edisi: edisi,
      stok: parseInt(stok),
      cover: "buku.jpg"
    });

    notif.innerText = "Data berhasil ditambahkan!";
    notif.style.color = "lightgreen";

    form.reset();
    tampilkanData();
  });

  tampilkanData();

});
</script>

</body>
</html>
